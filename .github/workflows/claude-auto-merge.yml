# 수정 Routine이 만든 claude/* PR을 Claude가 적대적으로 검토 → 승인일 때만 자동 병합
name: Claude Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review-and-merge:
    # 자동 수정 PR(claude/* 브랜치)만 대상 — 사람이 연 PR은 수동 병합을 유지한다.
    if: startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    permissions:
      contents: write # 병합 + 브랜치 삭제
      pull-requests: write # 승인 + 병합 + 코멘트
      issues: read
      id-token: write
      actions: read # CI 결과 조회
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 검토 중 경량 검사를 위해 전체 히스토리

      - name: Adversarial review, merge only on approval
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          # 검토 Claude가 PR 조회·경량 검사·승인·병합을 수행할 수 있도록 허용.
          claude_args: '--allowed-tools "Bash(gh *),Bash(python3 *),Bash(python *),Bash(node *),Bash(pnpm *),Bash(git *),Read,Grep,Glob"'
          prompt: |
            You are the FINAL gate before this pull request merges into `master`.
            PR number: ${{ github.event.pull_request.number }}. Head branch: ${{ github.head_ref }}.

            This PR was produced by an automated fix routine. Review it ADVERSARIALLY —
            assume it may be wrong. Your job is to protect `master`.

            ## Your gate is careful code review — NOT full test execution.

            This project's real test suites need a GPU (torch/CUDA in
            airi/services/neru-audio) or a heavy monorepo install (pnpm), which this
            runner does NOT have. So DO NOT make your verdict depend on running them,
            and do NOT return NEEDS_CHANGES merely because you cannot execute the heavy
            suites. Base your verdict on rigorous reading of the diff, exactly as a
            senior reviewer would for a small, clear change.

            Steps:
            1. Read the PR and the issue it closes:
               `gh pr view ${{ github.event.pull_request.number }}` and
               `gh pr diff ${{ github.event.pull_request.number }}`.
            2. Review adversarially: does it ACTUALLY fix the linked issue? Any new bug,
               security hole, regression, or out-of-scope change? Trace edge cases and
               error paths. For changed Python files, run the LIGHTWEIGHT syntax check
               `python3 -m py_compile <file>` (it needs no torch/GPU). Skip heavy
               checks; note them as "not run (needs GPU/full install)".
            3. Post ONE comment via
               `gh pr comment ${{ github.event.pull_request.number }} --body "..."`
               starting with exactly one of:
               `VERDICT: APPROVE`, `VERDICT: NEEDS_CHANGES`, or `VERDICT: REJECT`,
               then concise reasons, plus what you verified and what you could not run.
            4. Merge policy:
               - APPROVE only when the diff is clearly correct, minimal, in-scope, and
                 low-risk on your review — even if the heavy suites could not run. Then:
                 `gh pr review ${{ github.event.pull_request.number }} --approve` and
                 `gh pr merge ${{ github.event.pull_request.number }} --squash --delete-branch`.
               - NEEDS_CHANGES / REJECT for a genuine code concern, a risky or large or
                 hard-to-follow change you cannot confidently vet by reading, or anything
                 touching auth/secrets/data handling. Then DO NOT approve or merge —
                 leave the comment and stop.

            Approve confident small fixes; withhold merge on real doubt about the code.
